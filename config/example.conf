# gleis project config — example
#
# Copy this file to one of:
#   <repo-root>/.gleis.conf                        (recommended; checked into project)
#   ~/.config/gleis/<repo-name>.conf               (per-project, kept in your home)
#   ~/.config/gleis/default.conf                   (fallback for all repos)
#
# Edit the values below for your app, then run `gleis` from inside the repo.

# ── Required ──────────────────────────────────────────────────────────────────

# Xcode scheme to build (run `xcodebuild -list` in your repo to see all schemes).
# gleis will fail fast if this scheme doesn't exist.
SCHEME="MyApp"

# Xcode project or workspace, relative to repo root.
# Use .xcodeproj for plain projects, .xcworkspace for CocoaPods/SPM workspaces.
# Subdirectories are allowed for monorepo layouts.
#
# Examples:
#   PROJECT="MyApp.xcodeproj"
#   PROJECT="MyApp.xcworkspace"
#   PROJECT="ios/MyApp.xcodeproj"
PROJECT="MyApp.xcodeproj"

# App bundle identifier — what gets installed/launched.
# gleis cross-checks this against the built app's Info.plist and warns on mismatch.
BUNDLE_ID="com.example.myapp"

# ── Optional ──────────────────────────────────────────────────────────────────

# Build configuration. Debug is fast with assertions; Release is optimized.
# Custom configurations like "Debug-Staging" work too as long as they exist in
# the Xcode project.
# CONFIG="Debug"

# The .app filename, if it differs from SCHEME. For most projects, the scheme
# name and product name match and you can leave this unset. Set this when, for
# example, scheme "MyApp-Dev" produces "MyApp.app".
# PRODUCT_NAME="MyApp"

# Gitignored files gleis should auto-copy from another worktree if missing.
# Useful for local secrets, API keys, generated config, etc.
# Paths are relative to the worktree root.
#
# LOCAL_FILES=(
#   "MyApp/SecretsLocal.swift"
#   "MyApp/Config/LocalEnv.swift"
# )

# ── Ship ─────────────────────────────────────────────────────────────────────
#
# Optional unless you run `gleis abfahrt`. The easiest setup is:
#
#   gleis abfahrt init
#
# `gleis abfahrt` archives a signed iOS .ipa, writes an OTA manifest/install page,
# and deploys them to Vercel so your iPhone can install the latest build from
# https://$SHIP_DOMAIN/.

# Apple Developer team used for export/signing.
# TEAM_ID="ABCDE12345"

# Hostname configured on the Vercel project, e.g. install.example.app.
# SHIP_DOMAIN="install.example.app"

# Vercel project to deploy the OTA install page to.
# VERCEL_PROJECT="your-vercel-project"

# Archive configuration. Release is the normal shipping default.
# SHIP_CONFIG="Release"

# Xcode export method. Common values include release-testing, ad-hoc, and
# development depending on your Xcode version/signing setup.
# SHIP_METHOD="release-testing"

# Xcode export signing style.
# SHIP_SIGNING="automatic"

# Title shown on the install page and iOS OTA install sheet. Defaults to
# PRODUCT_NAME/SCHEME when unset.
# SHIP_TITLE="MyApp"

# Optional checked-in ExportOptions.plist path, relative to repo root or absolute.
# When unset, gleis generates one in its abfahrt cache from the settings above.
# EXPORT_OPTIONS="ExportOptions.plist"
